# GitHub Actions：CI 构建验证
# 触发条件：推送到 main 分支或 PR
# 目的：验证代码是否能正常编译

name: 🔍 CI 构建验证

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '22'

jobs:
  # Windows 编译验证
  build-windows:
    name: 🪟 Windows 编译验证
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: 安装 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 整理 Go 模块依赖
        run: go mod tidy

      - name: 安装 Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: 安装前端依赖
        working-directory: frontend
        run: npm install

      - name: 构建 Windows 可执行程序
        run: wails build -platform windows/amd64 -ldflags "-s" -o "xtool.exe"

      - name: 验证构建产物
        shell: pwsh
        run: |
          if (Test-Path "build\bin\xtool.exe") {
            $file = Get-Item "build\bin\xtool.exe"
            Write-Host "✅ 构建成功: $($file.FullName)"
            Write-Host "   大小: $([math]::Round($file.Length / 1MB, 2)) MB"
          } else {
            Write-Error "❌ 构建产物未找到"
            exit 1
          }

  # Linux 编译验证
  build-linux:
    name: 🐧 Linux 编译验证
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: 安装 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 安装 Linux 系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev gcc pkg-config

      - name: 整理 Go 模块依赖
        run: go mod tidy

      - name: 安装 Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: 安装前端依赖
        working-directory: frontend
        run: npm install

      - name: 构建 Linux 可执行文件
        run: wails build -platform linux/amd64 -ldflags "-s" -o "xtool"

      - name: 验证构建产物
        run: |
          if [ -f "build/bin/xtool" ]; then
            echo "✅ 构建成功: build/bin/xtool"
            ls -lh build/bin/xtool
          else
            echo "❌ 构建产物未找到"
            exit 1
          fi

  # macOS 编译验证
  build-macos:
    name: 🍎 macOS 编译验证
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: 安装 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 整理 Go 模块依赖
        run: go mod tidy

      - name: 安装 Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: 安装前端依赖
        working-directory: frontend
        run: npm install

      - name: 构建 macOS 应用 (amd64)
        run: wails build -platform darwin/amd64 -ldflags "-s"

      - name: 验证构建产物
        run: |
          if [ -d "build/bin/XTool.app" ]; then
            echo "✅ 构建成功: build/bin/XTool.app"
            ls -la build/bin/
          else
            echo "❌ 构建产物未找到"
            exit 1
          fi
